<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NittanyAuction Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .overlay {
            width: 500px;
            max-width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
        }

        .overlay input, .overlay select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }

        .section-title {
            color: white;
            text-align: left;
            margin-top: 15px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
        }
        .overlay input:focus:invalid {
            outline: 2px solid #ff4d4d;
        }
    </style>
</head>
<body onload="toggleFields()">
    <div class="hero" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: url('{{ url_for('static', filename='images/nittanylion.jpg') }}'); background-size: cover; background-position: center;">

        <div class="overlay">
            <h2 style="color: white; margin-bottom: 20px;">Create Account</h2>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <p style="color: #ff4d4d; font-weight: bold;">{{ messages[0] }}</p>
              {% endif %}
            {% endwith %}

            <form method="POST" action="/register">

                <select name="role" id="roleSelect" onchange="toggleFields()" required>
                    <option value="Bidder">Register as Bidder</option>
                    <option value="Seller">Register as Seller</option>
                    <option value="LocalVendor">Register as Local Vendor</option>
                </select>

                <h4 class="section-title">Login Details</h4>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password (Min 6 chars)" minlength="6" required>

                <div id="personalSection">
                    <h4 class="section-title">Personal Information</h4>
                    <input type="text" name="first_name" placeholder="First Name" required>
                    <input type="text" name="last_name" placeholder="Last Name" required>
                    <input type="number" name="age" placeholder="Age" min="18" max="120">
                    <input type="text" name="major" placeholder="Major">

                    <h4 class="section-title">Home Address</h4>
                    <input type="text" name="address_id" placeholder="Create Address ID">
                    <input type="text" name="street_num" placeholder="Street #" required>
                    <input type="text" name="street_name" placeholder="Street Name" required>
                    <input type="text" name="city" placeholder="City" required>
                    <input type="text" name="state" placeholder="State" required>
                    <input type="text" name="zipcode" placeholder="Zipcode" pattern="\d{5}" title="Five digit zip code" required>

                    <h4 class="section-title">Credit Card</h4>
                    <input type="text" name="cc_number" placeholder="Card Number (No spaces)" pattern="\d{13,19}" title="13 to 19 digit card number" required>
                    <select name="cc_type" required>
                        <option value="Visa">Visa</option>
                        <option value="MasterCard">MasterCard</option>
                        <option value="Amex">American Express</option>
                        <option value="Discover">Discover</option>
                    </select>
                    <input type="number" name="cc_exp_month" placeholder="Exp Month (1-12)" min="1" max="12" required>
                    <input type="number" name="cc_exp_year" placeholder="Exp Year (YYYY)" min="2026" required>
                    <input type="text" name="cc_security_code" placeholder="CVV" pattern="\d{3,4}" title="3 or 4 digit security code" required>
                </div>

                <div id="businessSection" style="display:none;">
                    <h4 class="section-title">Business Information</h4>
                    <input type="text" name="business_name" placeholder="Business Name" required>
                    <input type="text" name="customer_service_phone_number" placeholder="Customer Service Phone" required>

                    <h4 class="section-title">Business Address</h4>
                    <input type="text" name="business_address_id" placeholder="Create Business Address ID" required>
                    <input type="text" name="business_street_num" placeholder="Street #" required>
                    <input type="text" name="business_street_name" placeholder="Street Name" required>
                    <input type="text" name="business_city" placeholder="City" required>
                    <input type="text" name="business_state" placeholder="State" required>
                    <input type="text" name="business_zipcode" placeholder="Zipcode" pattern="\d{5}" title="Five digit zip code" required>
                </div>

                <div id="bankSection" style="display:none;">
                    <h4 class="section-title">Banking Information</h4>
                    <input type="text" name="bank_routing_number" placeholder="Bank Routing # (9 Digits)" pattern="\d{9}" title="9 digit routing number" required>
                    <input type="text" name="bank_account_number" placeholder="Bank Account #" required>
                </div>

                <button type="submit" style="width: 100%; padding: 12px; background-color: #1d3557; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px;">
                    Register Now
                </button>
            </form>

            <p style="margin-top: 15px; color: white;">
                Already have an account? <a href="{{ url_for('login') }}" style="color: white; font-weight: bold;">Log In</a>
            </p>
        </div>
    </div>

    <script>
        function toggleSection(section, isVisible) {
            section.style.display = isVisible ? "block" : "none";
            var inputs = section.querySelectorAll('input, select');
            inputs.forEach(function(input) {
                input.disabled = !isVisible;
            });
        }

        function toggleFields() {
            var role = document.getElementById("roleSelect").value;
            var personal = document.getElementById("personalSection");
            var business = document.getElementById("businessSection");
            var bank = document.getElementById("bankSection");

            if (role === "Bidder") {
                toggleSection(personal, true);
                toggleSection(business, false);
                toggleSection(bank, false);
            }
            else if (role === "Seller") {
                toggleSection(personal, true);
                toggleSection(business, false);
                toggleSection(bank, true);
            }
            else if (role === "LocalVendor") {
                toggleSection(personal, false);
                toggleSection(business, true);
                toggleSection(bank, true);
            }
        }
    </script>
</body>
</html>
