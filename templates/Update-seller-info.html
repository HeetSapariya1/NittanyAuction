<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Profile Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="seller-header">
    <h1>Seller Profile Dashboard</h1>
    <div class="seller-header-right">
        <button
          class="top-btn"
          onclick="window.location.href='{{ url_for('update_bidder_info') }}'"
        >
          Profile
        </button>
            <button class="top-btn" style="background-color: #d9534f; color: white; border: none;" onclick="window.location.href='{{ url_for('logout') }}'">
              Logout
            </button>
            <a href="{{ url_for('seller_dashboard') }}">
            <img
              src="{{ url_for('static', filename='images/psu-logo.png') }}"
              alt="Logo"
              class="dashboard-logo"
            />
            </a>
    </div>
</div>

<div class="seller-wrapper">

    <div class="seller-watermark">
        <img src="{{ url_for('static', filename='images/Penn-State-University-Seal-Logo.png') }}"
             alt="Watermark">
    </div>

    <h2 style="margin-left:6%; font-weight:normal;">
        Hello {{ seller['email'] or 'User' }}!
    </h2>

    {% if request.args.get('error') %}
        <p style="color:red; margin-left:6%;">{{ request.args.get('error') }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('profile_update') }}">
        <div class="seller-form-box">

            <!-- These first inputs let the seller update bank information and view the current balance. -->
            <div style="display:flex; gap:8px;">
                <input class="seller-input"
                     name="bank_routing_number"
                    placeholder="Bank Routing Number..."
                    value="{{ seller['bank_routing_number'] or '' }}">
                <input class="seller-input"
                    name="bank_account_number"
                     placeholder="Bank Account Number..."
                     value="{{ seller['bank_account_number'] or '' }}">
                <input class="seller-input"
                       placeholder="Balance..."
                        value="${{ '%.2f'|format(seller['balance'] or 0) }}"
                        disabled>
            </div>

            <!-- The email stays read only so the account keeps a stable identifier. -->
            <!-- Read only email -->
            <input class="seller-input"
                   placeholder="Email..."
                   value="{{ seller['email'] }}"
                   disabled>

            <input class="seller-input"
                   type="password"
                   name="new_password"
                   placeholder="New Password (leave blank to keep current)">

            <input class="seller-input"
                   type="password"
                   name="confirm_password"
                   placeholder="Confirm Password">

        </div>

        <div class="seller-bottom-row">
            <!-- These buttons let the seller save changes or ask for account deletion help. -->
            <button type="button" class="seller-list-btn"
                    onclick="alert('Please contact HelpDesk to delete your account.')">
                Delete Profile
            </button>
            <button type="submit" class="seller-list-btn" onclick="window.location.href='{{ url_for('seller_dashboard') }}'">Save Profile</button>
        </div>

    </form>
</div>

</body>
</html>
