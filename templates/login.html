<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NittanyAuction Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <h1>NittanyAuction - Login</h1>
    </div>

    <div class="hero">
        <img src="{{ url_for('static', filename='images/nittanylion.jpg') }}" class="bg-img" alt="Nittany Lion">

        <form class="overlay" method="POST" action="/">
            <h2>Login</h2>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
            <button type="button" onclick="window.location.href='{{ url_for('register') }}'">
                Create Account
            </button>
        </form>
    </div>
</body>
</html>
