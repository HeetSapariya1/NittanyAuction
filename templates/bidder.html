<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NittanyAuction Bidder Home</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="dashboard-header">
      <h1>NittanyAuction - Home</h1>

      <div class="header-buttons">
        <button
          class="top-btn"
          onclick="window.location.href='{{ url_for('my_bids_dashboard') }}'"
        >
          View My Bids
        </button>
        <button class="top-btn">Profile</button>
        <button class="icon-btn">
          <i class="fa-solid fa-bell"></i>
        </button>
        <img
          src="{{ url_for('static', filename='images/psu-logo.png') }}"
          alt="Logo"
          class="dashboard-logo"
        />
      </div>
    </div>

    <div class="dashboard-wrapper">
      <div class="dashboard-main">
        <div class="dashboard-watermark">
          <img
            src="{{ url_for('static', filename='images/Penn-State-University-Seal-Logo.png') }}"
            alt="Background Logo"
          />
        </div>

        <div class="sidebar">
          <div class="sidebar-title">Categories</div>

          <button class="category-btn">Electronics</button>
          <button class="category-btn">Books</button>
          <button class="category-btn">Furniture</button>
          <button class="category-btn">Clothing</button>
          <button class="category-btn">Sports</button>
          <button class="category-btn">Premium Auction</button>
        </div>

        <div class="dashboard-content">
          <input
            type="text"
            class="search-box"
            placeholder="Search products..."
          />

          <div class="product-grid">
            <div class="product-card">Product 1</div>
            <div class="product-card">Product 2</div>
            <div class="product-card">Product 3</div>
            <div class="product-card">Product 4</div>
            <div class="product-card">Product 5</div>
            <div class="product-card">Product 6</div>
            <div class="product-card">Product 7</div>
            <div class="product-card">Product 8</div>
            <div class="product-card">Product 9</div>
            <div class="product-card">Product 10</div>
            <div class="product-card">Product 11</div>
            <div class="product-card">Product 12</div>
          </div>

          <div class="next-page-row">
            <span>Next Page ➡</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
