<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Payment — NittanyAuction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <!-- HEADER -->
    <div class="seller-header">
      <h1>Payment</h1>
      <div class="seller-header-right">
        <button
          class="top-btn"
          onclick="window.location.href='{{ url_for('bidder_dashboard') }}'"
        >
          ← Back
        </button>
        <button
          class="top-btn"
          style="background-color: #d9534f; color: white; border: none"
          onclick="window.location.href='{{ url_for('logout') }}'"
        >
          Logout
        </button>
        <a href="{{ url_for('bidder_dashboard') }}">
          <img
            src="{{ url_for('static', filename='images/psu-logo.png') }}"
            alt="Logo"
            class="dashboard-logo"
          />
        </a>
      </div>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="seller-wrapper">
      <div class="seller-watermark">
        <img
          src="{{ url_for('static', filename='images/Penn-State-University-Seal-Logo.png') }}"
          alt="Watermark"
        />
      </div>

      <h2 style="margin-left: 6%; font-weight: normal">
        {{ listing[0] }} — <strong>${{ "%.2f"|format(winning_bid) }}</strong>
      </h2>

      {% if error %}
      <p style="margin-left: 6%; color: #721c24">{{ error }}</p>
      {% endif %}

      <form method="POST">
        <div class="seller-form-box">
          <input
            class="seller-input"
            name="credit_card_num"
            placeholder="Credit Card Number..."
            value="{{ saved_card[0] if saved_card else '' }}"
            required
          />

          <input
            class="seller-input"
            name="card_type"
            placeholder="Card Type (Visa, Mastercard...)..."
            value="{{ saved_card[1] if saved_card else '' }}"
            required
          />

          <div style="display: flex; gap: 8px">
            <input
              class="seller-input"
              name="expire_month"
              type="number"
              placeholder="Exp Month..."
              min="1"
              max="12"
              value="{{ saved_card[2] if saved_card else '' }}"
              required
            />

            <input
              class="seller-input"
              name="expire_year"
              type="number"
              placeholder="Exp Year..."
              min="2024"
              value="{{ saved_card[3] if saved_card else '' }}"
              required
            />
          </div>

          <input
            class="seller-input"
            name="security_code"
            type="number"
            placeholder="Security Code..."
            required
          />
        </div>

        <input type="hidden" name="seller_email" value="{{ seller_email }}" />
        <input type="hidden" name="listing_id" value="{{ listing_id }}" />

        <div class="seller-bottom-row">
          <button type="submit" class="seller-list-btn">Confirm Payment</button>
        </div>
      </form>
    </div>
  </body>
</html>
