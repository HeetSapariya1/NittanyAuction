<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Payment Page</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      .confirm-box {
        position: relative;
        z-index: 1;
        width: 60%;
        max-width: 700px;
        margin: 60px auto 0 auto;
        border: 2px solid #333;
        background: white;
        padding: 48px 40px 36px 40px;
        text-align: center;
      }

      .confirm-box p {
        font-size: 1.1rem;
        line-height: 2;
        color: #222;
      }

      .confirm-box a {
        color: #0b2a5b;
        text-decoration: underline;
        font-weight: bold;
      }

      .submit-btn {
        background: #0b2a5b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 16px 48px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 32px;
      }

      .submit-btn:hover {
        background: #24497f;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-header">
      <h1>Payment</h1>
      <div class="header-buttons">
        <button
          class="top-btn"
          onclick="window.location.href='{{ url_for('update_bidder_info') }}'"
        >
          Profile
        </button>
        <img
          src="{{ url_for('static', filename='images/psu-logo.png') }}"
          alt="Logo"
          class="dashboard-logo"
        />
      </div>
    </div>

    <div class="dashboard-wrapper">
      <div class="dashboard-watermark">
        <img
          src="{{ url_for('static', filename='images/Penn-State-University-Seal-Logo.png') }}"
          alt="Watermark"
        />
      </div>

      <div class="confirm-box">
        <p>
          You won <strong>{{ listing[0] }}</strong>!<br /><br />
          Amount due: <strong>${{ "%.2f"|format(winning_bid) }}</strong
          ><br /><br />
          Payment processing soon; In the meantime, check out other items at
          <a href="{{ url_for('bidder_dashboard') }}">NittanyAuction</a>!
        </p>
        <button
          class="submit-btn"
          onclick="window.location.href='{{ url_for('bidder_dashboard') }}'"
        >
          Back to Home
        </button>
      </div>
    </div>
  </body>
</html>
