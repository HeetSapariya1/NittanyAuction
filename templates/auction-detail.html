<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ listing[2] }} — NittanyAuction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="seller-header">
      <h1>Auction Listing</h1>
      <div class="seller-header-right">
        <button
          class="seller-top-btn"
          onclick="window.location.href='{{ url_for('bidder_dashboard') }}'"
        >
          Back
        </button>
        <button
          class="seller-top-btn"
          style="background-color: #d9534f"
          onclick="window.location.href='{{ url_for('logout') }}'"
        >
          Logout
        </button>
        <a href="{{ url_for('bidder_dashboard') }}">
          <img
            src="{{ url_for('static', filename='images/psu-logo.png') }}"
            alt="Logo"
            class="dashboard-logo"
          />
        </a>
      </div>
    </div>

    <div class="seller-wrapper">
      <div class="seller-watermark">
        <img
          src="{{ url_for('static', filename='images/Penn-State-University-Seal-Logo.png') }}"
          alt="Watermark"
        />
      </div>

      <h2 style="margin-left: 6%; font-weight: normal">{{ listing[2] }}</h2>

      <div class="seller-form-box">
        {% if feedback %}
        <div
          class="seller-input"
          style="color:{{ '#155724' if feedback_type == 'success' else '#721c24' }};
                    background:{{ '#d4edda' if feedback_type == 'success' else '#f8d7da' }};
                    height:auto;padding:14px 20px;text-align:left;"
        >
          {{ feedback }}
        </div>
        {% endif %}

        <input
          class="seller-input"
          value="Product: {{ listing[3] }}"
          disabled
        />
        <input
          class="seller-input"
          value="Description: {{ listing[4] or 'N/A' }}"
          disabled
        />
        <input
          class="seller-input"
          value="Category: {{ listing[9] }}"
          disabled
        />
        <input
          class="seller-input"
          value="Reserve Price: ${{ '%.2f'|format(listing[5]) }}"
          disabled
        />
        <input
          class="seller-input"
          value="Current Highest Bid: ${{ '%.2f'|format(highest_bid) }}"
          disabled
        />
        <input
          class="seller-input"
          value="Bids Remaining: {{ listing[7] }} / {{ listing[6] }}"
          disabled
        />

        {% if listing[8] == 1 %} {% if last_bidder == current_user %}
        <input
          class="seller-input"
          style="
            color: #856404;
            background: #fff3cd;
            height: auto;
            padding: 14px 20px;
          "
          value="You placed the last bid. Wait for another bidder before bidding again."
          disabled
        />
        {% else %}
        <form method="POST" action="{{ url_for('place_bid') }}">
          <input type="hidden" name="seller_email" value="{{ listing[0] }}" />
          <input type="hidden" name="listing_id" value="{{ listing[1] }}" />
          <input
            class="seller-input"
            type="number"
            step="0.01"
            name="bid_price"
            placeholder="Your bid (min ${{ '%.2f'|format(highest_bid + 1.0) }})"
            min="{{ highest_bid + 1.0 }}"
            required
          />
          <div class="seller-bottom-row">
            <button type="submit" class="seller-list-btn">Place Bid</button>
          </div>
        </form>
        {% endif %} {% else %}
        <input
          class="seller-input"
          style="
            color: #721c24;
            background: #f8d7da;
            height: auto;
            padding: 14px 20px;
          "
          value="This auction has ended."
          disabled
        />
        <div class="seller-bottom-row">
          <a
            href="{{ url_for('auction_result', seller_email=listing[0], listing_id=listing[1]) }}"
          >
            <button class="seller-list-btn">View Result</button>
          </a>
        </div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
