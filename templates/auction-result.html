<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Auction Result</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="dashboard-header">
      <h1>Auction Ended</h1>
      <div class="header-buttons">
        <button
          class="top-btn"
          onclick="window.location.href='{{ url_for('bidder_dashboard') }}'"
        >
          Home
        </button>
      </div>
    </div>

    <div class="dashboard-wrapper">
      <div class="dashboard-main">
        <div
          class="dashboard-content"
          style="max-width: 480px; margin: auto; padding-top: 40px"
        >
          <h2>{{ title }}</h2>
          <p>Winning bid: <strong>${{ "%.2f"|format(winning_bid) }}</strong></p>

          {% if reserve_met %} {% if is_winner %}
          <div
            style="
              padding: 16px;
              background: white;
              color: green;
              border-radius: 6px;
            "
          >
            You won this auction!
          </div>
          <button
            type="button"
            style="
              margin-top: 12px;
              background-color: blue;
              color: white;
              border: none;
              padding: 10px 20px;
              font-size: 1rem;
              border-radius: 6px;
              cursor: pointer;
            "
            onclick="window.location.href='{{ url_for('payment', seller_email=seller_email, listing_id=listing_id) }}'"
          >
            Proceed to Payment
          </button>

          {% else %}
          <div
            style="
              padding: 16px;
              background: white;
              color: brown;
              border-radius: 6px;
            "
          >
            This auction was won by another bidder.
          </div>
          {% endif %} {% else %}
          <div
            style="
              padding: 16px;
              background: white;
              color: brown;
              border-radius: 6px;
            "
          >
            Auction ended but the reserve price was not met. No sale.
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
